name: panel_surya
description: "Aplikasi monitoring panel surya."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  google_fonts: ^6.2.1
  lucide_flutter: ^1.23.0
  firebase_auth: ^6.5.4
  firebase_database: ^12.4.4
  local_auth: ^3.0.1
  http: ^1.2.2
  socket_io_client: ^3.1.0
  provider: ^6.1.2
  excel: ^4.0.3
  pdf: ^3.11.1
  printing: ^5.13.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Grunge 
      fonts:
        - asset: assets/fonts/Grunge.ttf